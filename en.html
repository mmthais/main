<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Thaís Martins: education, technology, e-learning, instructional design, and digital projects.">
  <title>Thaís Martins</title>
  <style>
    :root {
      --ink: #181716;
      --muted: #625d57;
      --line: #d8d2ca;
      --paper: #f6f1ea;
      --surface: #fffaf2;
      --green: #1c5f4c;
      --blue: #285c8f;
      --rose: #9b3d52;
      --amber: #bd7a26;
      --shadow: 0 22px 70px rgba(35, 30, 25, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Helvetica, Arial, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(24, 23, 22, 0.035) 1px, transparent 1px),
        linear-gradient(180deg, rgba(24, 23, 22, 0.035) 1px, transparent 1px),
        var(--paper);
      background-size: 48px 48px;
      line-height: 1.42;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font: inherit;
    }

    .language-switch {
      position: fixed;
      top: 18px;
      right: 20px;
      z-index: 10;
      display: inline-flex;
      align-items: center;
      gap: 9px;
    }

    .language-option {
      display: inline-flex;
      align-items: center;
      opacity: 0.68;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .language-option:hover,
    .language-option[aria-current="page"] {
      opacity: 1;
    }

    .language-option:hover {
      transform: translateY(-1px);
    }

    .language-option svg {
      width: 20px;
      height: 14px;
      display: block;
    }

    .page {
      display: grid;
      width: min(1160px, calc(100% - 40px));
      min-height: 100svh;
      margin: 0 auto;
      grid-template-rows: auto auto auto;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(340px, 0.92fr);
      gap: clamp(22px, 5vw, 62px);
      align-items: center;
      padding: clamp(14px, 3vw, 38px) 0;
    }

    .intro {
      min-width: 0;
    }

    h1 {
      max-width: 720px;
      font-size: clamp(3.5rem, 9vw, 8.3rem);
      font-weight: 900;
      line-height: 0.78;
      letter-spacing: -0.055em;
      font-kerning: normal;
      text-rendering: geometricPrecision;
    }

    .intro-text {
      max-width: 560px;
      margin-top: 16px;
      color: var(--muted);
      font-size: clamp(0.82rem, 1.05vw, 0.96rem);
    }

    .section-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: clamp(14px, 2.4vw, 26px);
    }

    .section-card {
      position: relative;
      display: grid;
      min-height: 78px;
      place-items: center;
      align-content: center;
      padding: 10px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      box-shadow: none;
      color: var(--green);
      cursor: pointer;
      transition: color 180ms ease, transform 180ms ease;
    }

    .section-card:hover,
    .section-card:focus-visible {
      background: transparent;
      transform: translateY(-3px);
      outline: none;
    }

    .section-card:focus-visible {
      outline: 1px solid currentColor;
      outline-offset: 8px;
    }

    .section-card:nth-child(2),
    .section-card:nth-child(5) {
      color: var(--blue);
    }

    .section-card:nth-child(3),
    .section-card:nth-child(6) {
      color: var(--rose);
    }

    .section-card:nth-child(4) {
      color: var(--amber);
    }

    .section-card svg {
      width: 52px;
      height: 52px;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2.45;
    }

    .section-card .hint {
      position: absolute;
      left: 50%;
      bottom: -12px;
      width: max-content;
      max-width: 220px;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--ink);
      box-shadow: none;
      font-size: 0.86rem;
      font-weight: 700;
      line-height: 1.2;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -4px);
      transition: opacity 160ms ease, transform 160ms ease;
      z-index: 2;
    }

    .section-card:hover .hint,
    .section-card:focus-visible .hint {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .footer {
      padding: 0 0 14px;
      color: rgba(98, 93, 87, 0.72);
      font-size: 0.68rem;
      text-align: center;
    }

    .content-view {
      display: none;
      margin: 0 0 clamp(34px, 6vw, 76px);
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255, 250, 242, 0.98);
      box-shadow: var(--shadow);
    }

    .content-view.is-visible {
      display: block;
    }

    .content-shell {
      display: grid;
      gap: 20px;
      padding: clamp(18px, 3vw, 30px);
    }

    .content-header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: start;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }

    .content-title {
      margin-top: 0;
      font-size: clamp(2.1rem, 5vw, 5.1rem);
      font-weight: 900;
      line-height: 0.82;
      letter-spacing: -0.052em;
      font-kerning: normal;
      text-rendering: geometricPrecision;
    }

    .close-button {
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: var(--surface);
      color: var(--ink);
      cursor: pointer;
      font-size: 1.35rem;
      line-height: 1;
    }

    .close-button:hover {
      color: var(--surface);
      border-color: var(--ink);
      background: var(--ink);
    }

    .content-body {
      display: grid;
      gap: 20px;
    }

    .lead {
      max-width: 800px;
      color: var(--muted);
      font-size: clamp(1rem, 1.4vw, 1.18rem);
    }

    .lead + .lead {
      margin-top: -12px;
    }

    .cluster {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .pill {
      display: inline-flex;
      min-height: 28px;
      align-items: center;
      padding: 5px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 250, 242, 0.66);
      color: var(--muted);
      font-size: 0.88rem;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1px;
      border: 1px solid var(--line);
      background: var(--line);
    }

    .metric {
      min-height: 128px;
      padding: 18px;
      background: rgba(255, 250, 242, 0.82);
    }

    .metric strong {
      display: block;
      margin-bottom: 12px;
      font-size: clamp(2rem, 4vw, 3.6rem);
      line-height: 1;
    }

    .metric span {
      color: var(--muted);
      font-size: 0.94rem;
    }

    .timeline {
      display: grid;
      gap: 1px;
      border: 1px solid var(--line);
      background: var(--line);
    }

    .item {
      display: grid;
      grid-template-columns: minmax(140px, 0.24fr) minmax(0, 1fr);
      gap: 18px;
      padding: clamp(16px, 2.4vw, 26px);
      background: rgba(255, 250, 242, 0.84);
    }

    .period {
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .item h3 {
      margin-bottom: 8px;
      font-size: clamp(1.18rem, 2vw, 1.55rem);
      font-weight: 900;
      line-height: 0.96;
      letter-spacing: -0.035em;
      text-rendering: geometricPrecision;
    }

    .item p,
    .item li {
      color: var(--muted);
    }

    .item ul {
      display: grid;
      gap: 6px;
      margin-top: 10px;
      padding-left: 18px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      margin-top: 10px;
      padding: 5px 8px;
      border-radius: 4px;
      color: var(--surface);
      background: var(--green);
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .status.progress {
      background: var(--blue);
    }

    .skills {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1px;
      border: 1px solid var(--line);
      background: var(--line);
    }

    .skill-group {
      min-height: 220px;
      padding: 20px;
      background: rgba(255, 250, 242, 0.84);
    }

    .skill-group:nth-child(2) {
      background: rgba(246, 241, 234, 0.9);
    }

    .skill-group h3 {
      margin-bottom: 12px;
      font-size: 1.16rem;
      font-weight: 900;
      line-height: 0.96;
      letter-spacing: -0.035em;
      text-rendering: geometricPrecision;
    }

    .skill-group ul {
      display: grid;
      gap: 8px;
      padding-left: 18px;
      color: var(--muted);
    }

    .project-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .project {
      display: grid;
      min-height: 0;
      grid-template-columns: 64px minmax(0, 1fr);
      gap: 12px 18px;
      align-items: start;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 250, 242, 0.84);
    }

    .project h3 {
      margin-bottom: 6px;
      font-size: clamp(1.3rem, 2vw, 1.8rem);
      font-weight: 900;
      line-height: 0.94;
      letter-spacing: -0.04em;
      text-rendering: geometricPrecision;
    }

    .project p {
      color: var(--muted);
    }

    .project-visual {
      display: grid;
      width: 56px;
      height: 56px;
      place-items: center;
      overflow: hidden;
      color: var(--ink);
    }

    .project-visual svg {
      width: 52px;
      height: 52px;
    }

    .project-visual circle {
      fill: var(--ink);
      stroke: none;
    }

    .project-visual text {
      fill: var(--surface);
      font-family: Helvetica, Arial, sans-serif;
      font-size: 23px;
      font-weight: 400;
      letter-spacing: 0;
      text-transform: lowercase;
    }

    .project-visual img {
      display: block;
      width: 52px;
      height: 52px;
      min-height: 0;
      object-fit: contain;
      filter: grayscale(1) contrast(1.08);
    }

    .project > div:last-child {
      grid-column: 2;
    }

    .button {
      display: inline-flex;
      width: 34px;
      height: 34px;
      align-items: center;
      justify-content: center;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 50%;
      color: var(--muted);
      background: transparent;
      transition: color 180ms ease, background 180ms ease, border-color 180ms ease, transform 180ms ease;
    }

    .button svg {
      width: 17px;
      height: 17px;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2.1;
    }

    .button:hover {
      color: var(--surface);
      border-color: var(--ink);
      background: var(--ink);
      transform: translateY(-1px);
    }

    .social-icons {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
    }

    .icon-link {
      display: inline-grid;
      width: 32px;
      height: 32px;
      place-items: center;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: var(--ink);
      transition: color 180ms ease, transform 180ms ease;
    }

    .icon-link:hover {
      color: var(--green);
      transform: translateY(-2px);
    }

    .icon-link svg {
      width: 28px;
      height: 28px;
      fill: currentColor;
    }

    @media (max-width: 920px) {
      .hero {
        grid-template-columns: 1fr;
        align-content: center;
      }

      .metrics,
      .skills,
      .project-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 620px) {
      .page {
        width: calc(100vw - 64px);
        max-width: 286px;
        margin-left: auto;
        margin-right: auto;
      }

      .hero {
        padding: 18px 0 24px;
      }

      h1 {
        max-width: 100%;
        font-size: clamp(2.2rem, 10vw, 2.65rem);
        overflow-wrap: break-word;
      }

      .intro-text {
        max-width: 100%;
      }

      .section-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px 28px;
      }

      .section-card {
        min-height: 58px;
      }

      .content-header,
      .item {
        grid-template-columns: 1fr;
      }

      .close-button {
        justify-self: start;
      }

      .project {
        grid-template-columns: 58px minmax(0, 1fr);
        gap: 10px 14px;
      }

      .project-visual {
        width: 50px;
        height: 50px;
      }

      .project-visual svg,
      .project-visual img {
        width: 46px;
        height: 46px;
      }

      .pill {
        white-space: normal;
      }
    }
  </style>
</head>

  <template id="template-sobre">
    <p class="lead">
      Since the beginning of my professional life, I have found myself between
      education and technology. I started by supporting learning environments,
      lab routines, and digital platforms, and this proximity made a path between
      these two fields feel almost inevitable.
    </p>
    <p class="lead">
      Today, I bring my interest in teaching into the work of thinking about the
      role of e-learning professionals: pedagogical mediation, student support,
      process organization, and digital solutions that make educational work
      clearer, easier to follow, and more human.
    </p>
    <div class="cluster" aria-label="Core skills">
      <span class="pill">Moodle</span>
      <span class="pill">E-learning tutoring</span>
      <span class="pill">Pedagogical mediation</span>
      <span class="pill">Instructional design</span>
      <span class="pill">HTML/CSS/JavaScript</span>
      <span class="pill">Academic processes</span>
      <span class="pill">Student support</span>
      <span class="pill">Digital education</span>
    </div>
    <div class="metrics" aria-label="Professional highlights">
      <div class="metric">
        <strong>10+</strong>
        <span>years working across educational support, tutoring, and applied technology.</span>
      </div>
      <div class="metric">
        <strong>1000+</strong>
        <span>students supported in academic routines and virtual learning environments.</span>
      </div>
      <div class="metric">
        <strong>3</strong>
        <span>education tracks: teaching degree, instructional design, and systems analysis.</span>
      </div>
      <div class="metric">
        <strong>LMS</strong>
        <span>hands-on experience with Moodle, learning materials, and educational communication.</span>
      </div>
    </div>
  </template>

  <template id="template-formacao">

        <div>

        <p class="period">2015 - 2019</p>

          <h3>Teaching Degree in History</h3>

        <p class="period">2011 - 2012</p>
        <div>
          <h3>Technical Degree in Computer Networks</h3>

          <span class="status">Completed</span>
        </div>
      </article>
    </div>
  </template>

  <template id="template-experiencia">
    <div class="timeline">
      <article class="item">
        <p class="period">07/2019 - present</p>
        <div>
          <h3>Technical and Administrative Tutor | Catholic University of Santos</h3>
          <p>Work across e-learning academic routines, supporting students and faculty, monitoring student progress, and organizing virtual learning environments.</p>
          <ul>
            <li>Mediation of forums, online activities, and communication channels with students.</li>
            <li>Monitoring of academic progress, retention, and engagement across courses.</li>
            <li>Organization of support materials, workflows, guidelines, and communication templates.</li>
            <li>Synchronous and asynchronous support for students, faculty, and internal teams.</li>
          </ul>
        </div>
      </article>
      <article class="item">
        <p class="period">10/2015 - 10/2017</p>
        <div>
          <h3>Student Support | Metropolitan University of Santos</h3>
          <p>Support for students enrolled in e-learning programs, including academic guidance, technical support, and routing of institutional requests.</p>
          <ul>
            <li>Support via institutional email and phone.</li>
            <li>Routing of requests to the responsible departments.</li>
            <li>Specific Moodle settings for exceptional academic cases.</li>
          </ul>
        </div>

  <script>
    var currentLanguage = document.documentElement.lang.toLowerCase().indexOf("pt") === 0 ? "pt" : "en";

    document.querySelectorAll("[data-language-choice]").forEach(function (link) {
      link.addEventListener("click", function (event) {
        try {
          localStorage.setItem("portfolioLanguage", link.dataset.languageChoice);
        } catch (error) {}

        if (link.dataset.languageChoice === currentLanguage) {
          event.preventDefault();
        }
      });
    });

    var contentView = document.getElementById("content-view");
    var contentTitle = document.getElementById("content-title");
    var contentBody = document.getElementById("content-body");
    var sectionLabels = {
      sobre: "About",
      formacao: "Education",
      experiencia: "Professional experience",
      habilidades: "Skills",
      projetos: "Projects",
      contato: "Contact"
    };

    function openSection(section, shouldScroll) {
      var template = document.getElementById("template-" + section);

      if (!template || !sectionLabels[section]) {
        return;
      }

      contentTitle.textContent = sectionLabels[section];
      contentBody.replaceChildren(template.content.cloneNode(true));
      contentView.classList.add("is-visible");

      if (shouldScroll) {
        contentView.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    }

    document.querySelectorAll("[data-section]").forEach(function (button) {
      button.addEventListener("click", function () {
        openSection(button.dataset.section, true);
      });
    });

    if (window.location.hash) {
      openSection(window.location.hash.slice(1), false);
    }
  </script>
